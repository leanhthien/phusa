# Local dev stack for Phù Sa.
#
#   docker compose up -d        # start Postgres + Redis
#   docker compose down         # stop, keep data
#   docker compose down -v      # stop and wipe volumes (fresh DB)
#
# Postgres uses the pgvector image (Postgres 16 + the `vector` extension
# prebuilt). The other extensions the schema needs -- unaccent, pg_trgm,
# pgcrypto, citext -- ship with the Postgres contrib package that's already in
# this image. Flyway creates all of them via `CREATE EXTENSION` in V1-V3, so
# nothing extra is needed here.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: phusa-postgres
    environment:
      POSTGRES_DB: phusa
      POSTGRES_USER: phusa
      POSTGRES_PASSWORD: phusa
    ports:
      - "5432:5432"
    volumes:
      - phusa-pgdata:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` alone returns true before the DB is truly accepting
      # connections on first boot; a trivial SELECT is the honest check.
      test: ["CMD-SHELL", "pg_isready -U phusa -d phusa && psql -U phusa -d phusa -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: phusa-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - phusa-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The app services below build from source. `docker compose up -d postgres redis`
  # alone gives just the infra (what you want when running the backend from the IDE).
  backend:
    build: .
    container_name: phusa-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/phusa
      DB_USER: phusa
      DB_PASSWORD: phusa
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build: ./web
    container_name: phusa-web
    depends_on:
      backend:
        condition: service_healthy
    # No backend URL needed here: behind Caddy the browser hits one origin and
    # `/api/*` is routed to the backend before it ever reaches this app. The
    # next.config rewrite only matters for the `npm run dev` (no-Caddy) workflow.
    expose:
      - "3000"

  # Single origin in front of web + backend. This is the URL you open (:80), and the
  # place HTTPS terminates on a real deploy.
  caddy:
    image: caddy:2-alpine
    container_name: phusa-caddy
    depends_on:
      - web
      - backend
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - phusa-caddydata:/data
      - phusa-caddyconfig:/config

volumes:
  phusa-pgdata:
  phusa-redisdata:
  phusa-caddydata:
  phusa-caddyconfig:
