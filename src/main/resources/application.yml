spring:
  application:
    name: phusa

  datasource:
    # Matches docker-compose.yml. Override via env in every other environment.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/phusa}
    username: ${DB_USER:phusa}
    password: ${DB_PASSWORD:phusa}

  jpa:
    hibernate:
      # LOCKED: validate only. Flyway owns the schema; Hibernate must never touch
      # DDL. `update` would silently diverge from the migrations and mask drift.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # We deal in UTC instants everywhere (TIMESTAMPTZ); pin the JDBC tz so
        # Hibernate doesn't apply the host's local zone.
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Baseline safety: never let Flyway "clean" a database, least of all in prod.
    clean-disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

phusa:
  ingest:
    # DEPLOYMENT switches only -- how often this instance wakes up, and whether it
    # crawls at all (off in tests). Nothing here is per-source.
    #
    # Per-source settings live in the `source` table: uniform policy in real columns
    # (enabled, crawl_interval_sec, rate_limit_per_min), kind-specific settings in
    # the `config` JSONB. They have to be editable at runtime -- the scheduler writes
    # back to them and the Phase 3 admin UI will too -- and yml is read-only to a
    # running app. `seed/sources.json` bootstraps rows that don't exist yet; after
    # that the database owns them.
    # Gates the source seeder only; the crawl loop is phusa.crawl below.
    enabled: ${INGEST_ENABLED:true}

  crawl:
    # The job queue. Same rule as above: deployment-level only. How often a source is
    # crawled is `source.crawl_interval_sec`, per source, in the database.
    enabled: ${CRAWL_ENABLED:true}
    enqueue-interval-ms: ${CRAWL_ENQUEUE_INTERVAL_MS:60000}    # scan for due sources
    poll-interval-ms: ${CRAWL_POLL_INTERVAL_MS:15000}          # claim + work a batch
    reap-interval-ms: ${CRAWL_REAP_INTERVAL_MS:120000}         # reclaim dead leases
    batch-size: ${CRAWL_BATCH_SIZE:10}
    lease-seconds: ${CRAWL_LEASE_SECONDS:300}
    retry-base-seconds: 60
    retry-max-seconds: 3600
    source-backoff-max-seconds: 3600
